<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Posture Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0c0c0c;--surface:#161616;--surface2:#1e1e1e;--surface3:#252525;
  --border:#2a2a2a;--border2:#333;
  --text:#f0f0f0;--text2:#a0a0a0;--text3:#606060;
  --teal:#1D9E75;--teal-bg:#0a2b1f;
  --coral:#D85A30;--coral-bg:#2b150a;
  --amber:#BA7517;--amber-bg:#2b1e0a;
  --red:#e24b4a;--red-bg:#2b0a0a;
  --radius:10px;--radius-lg:14px;--radius-xl:18px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:16px;line-height:1.5;overscroll-behavior:none}
button{font-family:var(--font);cursor:pointer}
#app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto}
#header{padding:max(env(safe-area-inset-top),16px) 20px 0;flex-shrink:0}
.header-inner{padding-bottom:10px}
#tabs{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid var(--border);flex-shrink:0}
#content{flex:1;overflow-y:auto;padding:16px 20px;padding-bottom:max(32px,env(safe-area-inset-bottom))}
.tab-btn{background:none;border:none;padding:12px 4px;font-size:12px;color:var(--text3);font-weight:500;letter-spacing:.03em;border-bottom:2px solid transparent;transition:color .15s,border-color .15s}
.tab-btn.active{color:var(--teal);border-bottom-color:var(--teal)}
.header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.app-title{font-size:20px;font-weight:600;letter-spacing:-.02em}
.streak-badge{display:flex;align-items:center;gap:4px;background:var(--amber-bg);border:1px solid var(--amber);border-radius:20px;padding:3px 9px;font-size:12px;font-weight:600;color:var(--amber)}
.week-label{font-size:12px;color:var(--text3);letter-spacing:.04em}
.sync-row{display:flex;align-items:center;gap:6px;margin-top:3px}
.sync-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;transition:background .3s}
.sync-dot.ok{background:var(--teal)}
.sync-dot.pending{background:var(--amber);animation:pulse 1.2s infinite}
.sync-dot.error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sync-label{font-size:11px;color:var(--text3)}
.today-hero{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:16px;margin-bottom:16px}
.today-day{font-size:12px;color:var(--text3);margin-bottom:2px;font-weight:500;letter-spacing:.05em;text-transform:uppercase}
.today-session{font-size:18px;font-weight:600;margin-bottom:10px}
.progress-ring-wrap{display:flex;align-items:center;gap:14px}
.ring-svg{width:56px;height:56px;transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--border2);stroke-width:5}
.ring-fill{fill:none;stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset .5s ease}
.today-stats .stat-line{font-size:13px;color:var(--text2);margin-bottom:2px}
.stat-val{font-weight:600;color:var(--text)}
.section-head{display:flex;align-items:center;justify-content:space-between;margin:18px 0 8px}
.section-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.section-count{font-size:12px;color:var(--text3)}
.ex-list{display:flex;flex-direction:column;gap:6px}
.ex-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:opacity .2s}
.ex-item.done{opacity:.55}
.ex-row{display:flex;align-items:center;gap:12px;padding:12px 14px;cursor:pointer;user-select:none}
.checkbox{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.checkbox.ticked{background:var(--teal);border-color:var(--teal)}
.checkbox.ticked::after{content:'';display:block;width:5px;height:9px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px)}
.ex-info{flex:1;min-width:0}
.ex-name{font-size:14px;font-weight:500;margin-bottom:2px}
.ex-dose{font-size:12px;color:var(--text3)}
.ex-tag{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:500;flex-shrink:0}
.tag-ucs{background:var(--teal-bg);color:var(--teal)}
.tag-apt{background:var(--coral-bg);color:var(--coral)}
.tag-both{background:#1a1a1a;color:var(--text2);border:1px solid var(--border2)}
.expand-btn{width:22px;height:22px;border-radius:50%;border:1px solid var(--border2);background:none;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:16px;flex-shrink:0;line-height:1;transition:all .2s}
.expand-btn.open{background:var(--surface3);color:var(--text)}
.ex-detail{display:none;padding:0 14px 12px;border-top:1px solid var(--border)}
.ex-detail.open{display:block}
.cue-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin:10px 0 4px}
.cue-text{font-size:13px;color:var(--text2);line-height:1.65}
.source-text{font-size:11px;color:var(--text3);margin-top:8px;line-height:1.5;padding:8px 10px;background:var(--surface2);border-radius:6px;font-style:italic}
.week-grid{display:flex;flex-direction:column;gap:6px}
.week-day-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.week-day-header{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none}
.day-name-col{font-size:14px;font-weight:500;min-width:96px}
.day-badge{font-size:10px;padding:2px 8px;border-radius:8px;font-weight:500;flex:1}
.badge-a{background:var(--teal-bg);color:var(--teal)}
.badge-b{background:var(--coral-bg);color:var(--coral)}
.badge-c{background:var(--amber-bg);color:var(--amber)}
.badge-rest{background:#1a1a1a;color:var(--text3)}
.day-count{font-size:11px;color:var(--text3)}
.day-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-full{background:var(--teal)}.dot-partial{background:var(--amber)}.dot-empty{background:var(--border2)}
.is-today .day-name-col{color:var(--teal)}
.week-day-body{display:none;padding:0 14px 12px;border-top:1px solid var(--border)}
.week-day-body.open{display:block}
.prog-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.prog-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px}
.prog-label{font-size:11px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.prog-val{font-size:28px;font-weight:700;margin-bottom:6px;line-height:1}
.prog-bar-bg{height:3px;background:var(--border2);border-radius:2px;overflow:hidden}
.prog-bar-fill{height:100%;border-radius:2px;transition:width .5s ease}
.fill-teal{background:var(--teal)}.fill-coral{background:var(--coral)}.fill-amber{background:var(--amber)}
.history-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.history-row:last-child{border-bottom:none}
.history-week{font-size:12px;color:var(--text2);min-width:56px}
.history-bar-wrap{flex:1;height:3px;background:var(--border2);border-radius:2px;overflow:hidden}
.history-fill{height:100%;background:var(--teal);border-radius:2px}
.history-pct{font-size:12px;font-weight:600;min-width:36px;text-align:right}
.habits-intro{font-size:13px;color:var(--text2);line-height:1.65;margin-bottom:14px;padding:11px 13px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
.danger-btn{width:100%;margin-top:8px;padding:11px;background:none;border:1px solid var(--border2);border-radius:var(--radius-lg);font-size:13px;color:var(--text3);transition:all .2s}
.danger-btn:active{background:var(--red-bg);border-color:var(--red);color:var(--red)}
#toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--surface3);border:1px solid var(--border2);border-radius:20px;padding:7px 16px;font-size:13px;color:var(--text);opacity:0;transition:all .22s;pointer-events:none;white-space:nowrap;z-index:200}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#content::-webkit-scrollbar{width:3px}
#content::-webkit-scrollbar-track{background:transparent}
#content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="header-inner">
      <div class="header-row">
        <div class="app-title">Posture Tracker</div>
        <div class="streak-badge">🔥 <span id="streakNum">0</span></div>
      </div>
      <div class="week-label" id="weekLabel"></div>
      <div class="sync-row">
        <div class="sync-dot pending" id="syncDot"></div>
        <div class="sync-label" id="syncLabel">Connecting...</div>
      </div>
    </div>
  </div>
  <div id="tabs">
    <button class="tab-btn active" onclick="switchTab('today')">TODAY</button>
    <button class="tab-btn" onclick="switchTab('schedule')">WEEK</button>
    <button class="tab-btn" onclick="switchTab('habits')">HABITS</button>
    <button class="tab-btn" onclick="switchTab('progress')">STATS</button>
  </div>
  <div id="content"></div>
</div>
<div id="toast"></div>

<script>
// ── Injected by GitHub Actions ── do not edit these lines manually
const SUPABASE_URL = '__SUPABASE_URL__';
const SUPABASE_KEY = '__SUPABASE_KEY__';
const USER_ID      = '__USER_ID__';

// ── Exercise data ─────────────────────────────────────────────────────────────
const SESSIONS={
  A:{label:'Upper — chest & posture',badge:'badge-a',badgeLabel:'Session A',time:'12–15 min',exercises:[
    {name:'Wall angel',dose:'3 × 10, slow',focus:'ucs',cue:'Stand with full back contact on wall, feet 6cm out. Slide arms up — elbows and wrists must stay in contact the whole time. If they lift off, shorten the range. Goal is thoracic extension + lower trap activation, not arm height.',src:'JOSPT wall slide study: highest serratus anterior activation above 90° humeral elevation. UCS systematic review (PMC10454745, 2023) confirms scapular stabilization exercises improve postural alignment.'},
    {name:'Serratus wall slide',dose:'3 × 12',focus:'ucs',cue:'Hands on wall, arms extended at shoulder height. Without bending elbows, reach shoulder blades forward (protract) — thoracic spine slightly rounds. Hold 2s at end range. Serratus anterior is the sole mover here, not the arms.',src:'JOSPT wall slide study: serratus anterior activation is highest during wall slide above 90° elevation vs traditional push-up plus.'},
    {name:'Y–T–W prone',dose:'3 × 10 each shape',focus:'ucs',cue:'Lie face down, arms overhead. Y = thumbs up, lift to Y shape. T = arms straight out to sides. W = elbows bent 90°, squeeze blades. All done slowly with no neck tension. Directly targets lower and middle trapezius.',src:'UCS systematic review (PMC10583860, 2023): lower/middle trap targeting showed significant improvement in scapular alignment and UCS postural correction.'},
    {name:'Chin tuck hold',dose:'3 × 8, 5s hold',focus:'ucs',cue:'Lie on your back. Pull chin straight back — not down. Lift head 2cm off floor, hold 5s. Deep neck flexors only. No jaw jut, no mouth opening. The most neglected UCS exercise.',src:'UCS treatment review (PMC10454745, 2023): deep neck flexor strengthening is the primary target due to SCM overactivation compensating for weak DNFs.'},
    {name:'Doorframe pec stretch',dose:'2 × 45s each side',focus:'ucs',cue:'Elbow at 90°, forearm on doorframe. Step through slowly. Feel it in the lower front chest (pec minor), not the shoulder. If you feel shoulder impingement, drop arm angle to 70°. Pec minor restriction directly limits scapular posterior tilt.',src:'Tight pec minor limits scapular upward rotation and posterior tilt — a primary structural driver of elevated chest posture (Physiopedia UCS).'},
  ]},
  B:{label:'Lower — pelvic tilt',badge:'badge-b',badgeLabel:'Session B',time:'12–15 min',exercises:[
    {name:'90/90 hip flexor stretch',dose:'3 × 60s each side',focus:'apt',cue:'Kneeling lunge, back knee on floor. Squeeze the back leg glute FIRST (this tilts the pelvis back), then lean your torso forward without arching the back. Without the glute squeeze you just compress the lumbar spine instead of stretching the iliopsoas.',src:'APT RCT (González-de-la-Flor et al., 2024): iliopsoas/rectus femoris/TFL stretching produced ~3.4° APT reduction. EMG confirmed glute max co-activation required for pelvic retroversion during stretch.'},
    {name:'Dead bug',dose:'3 × 8 each side, 3s lower',focus:'apt',cue:'Lie on back, arms vertical, knees at 90°. Press lower back INTO the floor — no gap at all. Slowly lower one arm overhead + opposite leg toward floor for 3s. If your back lifts: you have gone too far.',src:'Dead bug trains transversus abdominis and deep stabilizers with lumbar spine in neutral — directly antagonizes the APT pattern. NASM EMG study (PLOS ONE, 2024) confirmed gluteal + core co-activation.'},
    {name:'Glute bridge + posterior tilt',dose:'3 × 12, 2s hold',focus:'apt',cue:'Bridge up, but at the top tuck your pelvis (flatten your lower back) BEFORE lowering. Focus on glutes not hamstrings — if you feel hamstring cramp, feet are too far forward. The posterior tilt at the top is the actual corrective movement.',src:'EMG study (PMC10885056, 2024): glute max showed the strongest correlation with pelvic retroversion during bridge. NASM EMG confirmed glute max activation is most specific to APT correction.'},
    {name:'Prone RF stretch',dose:'2 × 45s each side',focus:'apt',cue:'Lie on stomach, pull one foot toward your glute. Add posterior tilt by squeezing the opposite glute. The rectus femoris crosses both hip and knee — standing quad stretches miss the hip flexor component. Prone position hits both.',src:'APT literature confirms rectus femoris as a primary driver of anterior tilt separate from the iliopsoas (TPM review, 2025).'},
    {name:'Bird dog',dose:'3 × 8 each side, 4s hold',focus:'both',cue:'All fours, neutral spine — no sagging, no arching. Extend one arm and opposite leg simultaneously. Keep hips LEVEL, do not let the extending hip drop or rotate. Hold 4s. Pelvic stability is the goal, not limb height.',src:'Bird dog activates erector spinae + multifidus symmetrically while forcing glute max and contralateral lat — trains muscle coordination needed for neutral pelvis during gait.'},
  ]},
  C:{label:'Integration & mobility',badge:'badge-c',badgeLabel:'Session C',time:'10–12 min',exercises:[
    {name:'Cat–camel',dose:'2 × 10 slow cycles',focus:'both',cue:'Full thoracic flexion → full extension, segmentally. Move ONE vertebra at a time from the sacrum upward. The camel (extension) phase mobilises thoracic extension and requires the lumbar spine to find neutral. This is motor control, not just stretching.',src:'Cat–camel included in all evidence-based thoracic kyphosis correction protocols reviewed (PMC10148263, 2023 feasibility study).'},
    {name:'Thoracic extension on roller',dose:'2 × 8 segments, 30s each',focus:'ucs',cue:'Sit in front of foam roller, support your head. Lean back so roller is at mid-thoracic (between shoulder blades — NOT lower back). Let your head drop back with control. Shift roller up 2cm after each hold.',src:'Thoracic extension exercises targeting T4–T8 are central to UCS correction. Overhead arm wall slide and thoracic extension improve scapular alignment associated with spine alignment (PMC10148263).'},
    {name:'Posterior pelvic tilt hold',dose:'5 × 10s standing',focus:'apt',cue:'Stand against wall. Contract abs and glutes simultaneously to flatten your lower back against it. No breath holding. This is the neutral posture you are working toward making automatic. Practice 10× per day whenever standing.',src:'2024 EMG study (PMC10885056): combined rectus abdominis + oblique externus + glute max is the most effective motor pattern for pelvic retroversion.'},
    {name:'Wall angel + belly breath',dose:'3 × 5 breaths in position',focus:'both',cue:'Get into wall angel position, hold it. Instead of moving arms, breathe into your belly and lateral ribs — not upper chest. Upper chest breathing fires scalenes and upper trap on every single breath, reinforcing UCS all day.',src:'RCT (PMC12606979): respiratory exercises added to scapular stabilization reduced upper trap activation and increased serratus anterior + lower trap activation vs exercise alone.'},
    {name:'Prone cobra',dose:'3 × 8, 3s hold',focus:'ucs',cue:'Lie face down, arms at sides, palms down. Lift head, chest, and hands by squeezing shoulder blades DOWN and back — not up toward ears. Thumbs rotate toward ceiling. Lower trap + rhomboids + mid trap all activated.',src:'Comprehensive kyphosis correction programs (PMC9778671) include prone extension for spinal extensor strengthening — demonstrated reduction in kyphosis angle in 8-week RCTs.'},
  ]},
};

const SCHEDULE=[
  {name:'Monday',   short:'Mon',session:'A'},
  {name:'Tuesday',  short:'Tue',session:'rest'},
  {name:'Wednesday',short:'Wed',session:'B'},
  {name:'Thursday', short:'Thu',session:'rest'},
  {name:'Friday',   short:'Fri',session:'C'},
  {name:'Saturday', short:'Sat',session:'A'},
  {name:'Sunday',   short:'Sun',session:'rest'},
];

const HABITS=[
  {name:'Chin tuck',dose:'5 reps × 3s — every 30 min seated',focus:'ucs',cue:'Pull chin straight back (not down), double chin. Hold 3s. Do every time you notice your head drifting forward. High-frequency low-load practice beats infrequent heavy loading for postural motor reprogramming.',src:'DNF weakness is the primary cervical finding in UCS. Frequent sub-maximal activation is more effective for postural motor learning.'},
  {name:'Shoulder blade set',dose:'10 reps × 5s — any position',focus:'ucs',cue:'Squeeze shoulder blades together AND pull them DOWN away from your ears simultaneously. Hold 5s. Fires lower and middle trap — directly counteracting the forward/elevated shoulder position you default to all day.',src:'Scapular setting targeting middle + lower trap is a primary daily intervention in all UCS treatment programs (PMC10583860, 2023).'},
  {name:'Seated posterior tilt',dose:'10 reps × 5s — when you sit down',focus:'apt',cue:'Sitting: tilt your pelvis backward so your lower back presses into the chair. Hold 5s. Contracts abs and glutes against the hip flexors dominating your sitting posture. Do this every time you take a seat.',src:'Seated posterior pelvic tilt is the primary habit intervention for APT. Daily habit frequency is critical for corrective exercise outcomes (McGill; Kendall).'},
  {name:'Standing glute squeeze',dose:'10s × 5 per hour standing',focus:'apt',cue:'Whenever standing: squeeze both glutes hard for 10s. Posteriorly tilts the pelvis and inhibits the overactive hip flexors simultaneously. Even 5× per day produces measurable glute activation change over weeks.',src:'Gluteal amnesia (Janda) is a primary mechanism in APT. Low-intensity frequent glute max activation has a cumulative neuromuscular effect on pelvic position.'},
  {name:'Diaphragmatic breathing reset',dose:'5 slow breaths — any time',focus:'both',cue:'One hand on belly, one on chest. Breathe so only the belly hand moves. 4s in (belly + lateral ribs), 6s out. Upper chest breathing fires scalenes and upper trap thousands of times per hour — reinforcing UCS on every single breath.',src:'RCT (PMC12606979): respiratory exercise integration showed EMG-confirmed reduction in upper trap activity and increased serratus anterior activation vs exercise alone.'},
];

// ── State ─────────────────────────────────────────────────────────────────────
const LOCAL_KEY = 'posture_data_v3';
let data = {checked:{}, weekKey:'', history:[], streak:0};
let syncTimer = null;
let currentTab = 'today';
let openDetails = {};

function getWeekKey(d){
  const day=new Date(d); day.setHours(0,0,0,0);
  const mon=new Date(day); mon.setDate(day.getDate()-((day.getDay()+6)%7));
  return mon.toISOString().slice(0,10);
}
function todayIdx(){const d=new Date().getDay(); return d===0?6:d-1;}

function saveLocal(){ try{localStorage.setItem(LOCAL_KEY,JSON.stringify(data));}catch(e){} }
function loadLocal(){ try{const r=localStorage.getItem(LOCAL_KEY); if(r)data=JSON.parse(r);}catch(e){} }

function weekRollover(){
  const wk=getWeekKey(new Date());
  if(data.weekKey && data.weekKey!==wk){
    const pct=weekPct(data.checked);
    data.history=([{week:data.weekKey,pct},...(data.history||[])]).slice(0,10);
    data.streak = pct>=70 ? (data.streak||0)+1 : 0;
    data.checked = {};
  }
  data.weekKey = wk;
}

function weekPct(checked){
  let t=0,d=0;
  SCHEDULE.forEach(day=>{
    if(day.session==='rest')return;
    SESSIONS[day.session].exercises.forEach((_,i)=>{t++;if(checked[day.short+'_'+i])d++;});
  });
  return t>0?Math.round(d/t*100):0;
}

// ── Supabase ──────────────────────────────────────────────────────────────────
const isConfigured = SUPABASE_URL !== '__SUPABASE_URL__';

function setSyncUI(state, msg){
  const dot=document.getElementById('syncDot');
  const lbl=document.getElementById('syncLabel');
  if(dot){ dot.className='sync-dot '+state; }
  if(lbl){ lbl.textContent=msg; }
}

async function push(){
  if(!isConfigured) return;
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/posture_data`,{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Prefer':'resolution=merge-duplicates'},
      body:JSON.stringify({user_id:USER_ID, data, updated_at:new Date().toISOString()}),
    });
    setSyncUI(res.ok?'ok':'error', res.ok?'Synced':'Sync failed');
  }catch(e){ setSyncUI('error','Sync failed'); }
}

async function pull(){
  if(!isConfigured){ setSyncUI('error','Not configured — check GitHub secrets'); return false; }
  setSyncUI('pending','Syncing...');
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/posture_data?user_id=eq.${encodeURIComponent(USER_ID)}&select=data`,{
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY},
    });
    if(!res.ok){ setSyncUI('error','Sync failed'); return false; }
    const rows=await res.json();
    if(rows&&rows.length>0&&rows[0].data){
      data=rows[0].data;
      weekRollover();
      saveLocal();
      setSyncUI('ok','Synced');
      return true;
    }
    // First time — push local up
    await push();
    return false;
  }catch(e){ setSyncUI('error','Sync failed'); return false; }
}

function schedulePush(){
  clearTimeout(syncTimer);
  setSyncUI('pending','Saving...');
  syncTimer=setTimeout(()=>push(),600);
}

// ── Render ────────────────────────────────────────────────────────────────────
function switchTab(tab){
  currentTab=tab; openDetails={};
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active',['today','schedule','habits','progress'][i]===tab);
  });
  render();
}

function render(){
  updateHeader();
  const c=document.getElementById('content');
  if(currentTab==='today')       c.innerHTML=renderToday();
  else if(currentTab==='schedule')c.innerHTML=renderSchedule();
  else if(currentTab==='habits')  c.innerHTML=renderHabits();
  else                            c.innerHTML=renderProgress();
  bindEvents();
}

function updateHeader(){
  const wk=data.weekKey||getWeekKey(new Date());
  const d=new Date(wk+'T12:00:00'), end=new Date(d); end.setDate(d.getDate()+6);
  const f=x=>`${x.getDate()} ${x.toLocaleString('default',{month:'short'})}`;
  document.getElementById('weekLabel').textContent=`Week of ${f(d)} – ${f(end)}`;
  document.getElementById('streakNum').textContent=data.streak||0;
}

function exItem(ex, key, uid){
  const done=!!data.checked[key];
  const tag = ex.focus==='ucs' ? '<span class="ex-tag tag-ucs">Chest</span>'
            : ex.focus==='apt' ? '<span class="ex-tag tag-apt">Pelvis</span>'
            : '<span class="ex-tag tag-both">Both</span>';
  const open = openDetails[uid];
  return `<div class="ex-item${done?' done':''}">
    <div class="ex-row">
      <div class="checkbox${done?' ticked':''}" data-check="${key}"></div>
      <div class="ex-info" data-expand="${uid}">
        <div class="ex-name">${ex.name}</div>
        <div class="ex-dose">${ex.dose}</div>
      </div>
      ${tag}
      <button class="expand-btn${open?' open':''}" data-expand="${uid}">${open?'−':'+'}</button>
    </div>
    <div class="ex-detail${open?' open':''}" id="ed_${uid}">
      <div class="cue-label">How to do it</div>
      <div class="cue-text">${ex.cue}</div>
      <div class="source-text">📄 ${ex.src}</div>
    </div>
  </div>`;
}

function renderToday(){
  const di=todayIdx(), day=SCHEDULE[di];
  const dayName=new Date().toLocaleDateString('en',{weekday:'long'});
  if(day.session==='rest') return `
    <div class="today-hero">
      <div class="today-day">${dayName}</div>
      <div class="today-session">Recovery day</div>
      <div style="text-align:center;padding:20px 0">
        <div style="font-size:28px;margin-bottom:8px">🌿</div>
        <div style="font-size:15px;font-weight:500;color:var(--text2)">Focus on daily habits only</div>
        <div style="font-size:13px;color:var(--text3);margin-top:4px">Tap Habits tab for your micro-exercises</div>
      </div>
    </div>
    ${habitsBlock('rest')}`;
  const sess=SESSIONS[day.session];
  let done=0; const total=sess.exercises.length;
  sess.exercises.forEach((_,i)=>{if(data.checked[day.short+'_'+i])done++;});
  const pct=Math.round(done/total*100);
  const r=24,circ=2*Math.PI*r,off=circ-(pct/100)*circ;
  const col=pct===100?'var(--teal)':pct>50?'var(--amber)':'var(--coral)';
  return `<div class="today-hero">
    <div class="today-day">${dayName}</div>
    <div class="today-session">${sess.label}</div>
    <div class="progress-ring-wrap">
      <svg class="ring-svg" viewBox="0 0 56 56" aria-hidden="true">
        <circle class="ring-bg" cx="28" cy="28" r="${r}"/>
        <circle class="ring-fill" cx="28" cy="28" r="${r}" stroke="${col}"
          stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"/>
        <text x="28" y="28" text-anchor="middle" dominant-baseline="central"
          transform="rotate(90,28,28)" style="font-size:12px;font-weight:700;fill:#f0f0f0">${pct}%</text>
      </svg>
      <div class="today-stats">
        <div class="stat-line"><span class="stat-val">${done}/${total}</span> done</div>
        <div class="stat-line">~<span class="stat-val">${sess.time}</span></div>
        <div class="stat-line">Session <span class="stat-val">${day.session}</span></div>
      </div>
    </div>
  </div>
  <div class="section-head"><div class="section-title">Exercises</div><div class="section-count">${done}/${total}</div></div>
  <div class="ex-list">${sess.exercises.map((ex,i)=>exItem(ex,day.short+'_'+i,`t${i}`)).join('')}</div>
  ${habitsBlock('today')}`;
}

function habitsBlock(ctx){
  return `<div class="section-head" style="margin-top:20px"><div class="section-title">Daily habits</div></div>
  <div class="ex-list">${HABITS.map((h,i)=>exItem(h,'habit_'+i,`h_${ctx}_${i}`)).join('')}</div>`;
}

function renderSchedule(){
  const ti=todayIdx();
  return `<div class="section-head"><div class="section-title">This week</div></div>
  <div class="week-grid">${SCHEDULE.map((d,i)=>{
    const isT=i===ti, isR=d.session==='rest';
    let done=0,total=0;
    if(!isR){
      const s=SESSIONS[d.session]; total=s.exercises.length;
      s.exercises.forEach((_,j)=>{if(data.checked[d.short+'_'+j])done++;});
    }
    const dc=!isR&&total>0?(done===total?'dot-full':done>0?'dot-partial':'dot-empty'):'dot-empty';
    const isOpen=openDetails['day'+i];
    return `<div class="week-day-row${isT?' is-today':''}">
      <div class="week-day-header" data-dayopen="${i}">
        <div class="day-name-col">${d.name}</div>
        <div class="day-badge ${isR?'badge-rest':'badge-'+d.session.toLowerCase()}">${isR?'Rest':SESSIONS[d.session].badgeLabel}</div>
        ${!isR&&total>0?`<div class="day-count">${done}/${total}</div>`:''}
        <div class="day-dot ${dc}"></div>
      </div>
      ${!isR?`<div class="week-day-body${isOpen?' open':''}" id="dayb${i}">
        <div class="ex-list" style="margin-top:10px">
          ${SESSIONS[d.session].exercises.map((ex,j)=>exItem(ex,d.short+'_'+j,`s${i}_${j}`)).join('')}
        </div>
      </div>`:''}
    </div>`;
  }).join('')}</div>`;
}

function renderHabits(){
  return `<div class="habits-intro">These take under 2 minutes each. Frequency beats intensity here — every time you sit, stand, or change position is a trigger.</div>
  <div class="section-head"><div class="section-title">Daily micro-exercises</div></div>
  <div class="ex-list">${HABITS.map((h,i)=>exItem(h,'habit_'+i,`habit${i}`)).join('')}</div>`;
}

function renderProgress(){
  let uT=0,uD=0,aT=0,aD=0,totT=0,totD=0;
  SCHEDULE.forEach(day=>{
    if(day.session==='rest')return;
    SESSIONS[day.session].exercises.forEach((ex,i)=>{
      const done=!!data.checked[day.short+'_'+i];
      totT++;if(done)totD++;
      if(ex.focus==='ucs'||ex.focus==='both'){uT++;if(done)uD++;}
      if(ex.focus==='apt'||ex.focus==='both'){aT++;if(done)aD++;}
    });
  });
  const wp=totT>0?Math.round(totD/totT*100):0;
  const up=uT>0?Math.round(uD/uT*100):0;
  const ap=aT>0?Math.round(aD/aT*100):0;
  const wc=wp>=70?'var(--teal)':wp>=40?'var(--amber)':'var(--coral)';
  const hist=data.history&&data.history.length>0
    ?data.history.map(h=>{
      const d=new Date(h.week+'T12:00:00');
      const lbl=`${d.getDate()} ${d.toLocaleString('default',{month:'short'})}`;
      const hc=h.pct>=70?'var(--teal)':h.pct>=40?'var(--amber)':'var(--coral)';
      return `<div class="history-row">
        <div class="history-week">${lbl}</div>
        <div class="history-bar-wrap"><div class="history-fill" style="width:${h.pct}%"></div></div>
        <div class="history-pct" style="color:${hc}">${h.pct}%</div>
      </div>`;
    }).join('')
    :`<div style="font-size:13px;color:var(--text3);padding:16px 0;text-align:center">Complete your first week to see history</div>`;
  return `<div class="prog-grid">
    <div class="prog-card"><div class="prog-label">This week</div><div class="prog-val" style="color:${wc}">${wp}%</div><div class="prog-bar-bg"><div class="prog-bar-fill fill-teal" style="width:${wp}%"></div></div></div>
    <div class="prog-card"><div class="prog-label">Streak</div><div class="prog-val" style="color:var(--amber)">${data.streak||0} 🔥</div><div style="font-size:11px;color:var(--text3)">weeks ≥ 70%</div></div>
    <div class="prog-card"><div class="prog-label">Chest / posture</div><div class="prog-val" style="color:var(--teal)">${up}%</div><div class="prog-bar-bg"><div class="prog-bar-fill fill-teal" style="width:${up}%"></div></div></div>
    <div class="prog-card"><div class="prog-label">Pelvic tilt</div><div class="prog-val" style="color:var(--coral)">${ap}%</div><div class="prog-bar-bg"><div class="prog-bar-fill fill-coral" style="width:${ap}%"></div></div></div>
  </div>
  <div class="section-head"><div class="section-title">Week history</div></div>
  ${hist}
  <button class="danger-btn" id="resetBtn">Reset this week's progress</button>`;
}

// ── Events ────────────────────────────────────────────────────────────────────
function bindEvents(){
  document.querySelectorAll('[data-check]').forEach(el=>{
    el.onclick=e=>{
      e.stopPropagation();
      const k=el.dataset.check;
      data.checked[k]=!data.checked[k];
      saveLocal(); schedulePush();
      if(data.checked[k]) toast('✓');
      render();
    };
  });
  document.querySelectorAll('[data-expand]').forEach(el=>{
    el.onclick=e=>{
      e.stopPropagation();
      const uid=el.dataset.expand;
      openDetails[uid]=!openDetails[uid];
      const det=document.getElementById('ed_'+uid);
      if(det) det.classList.toggle('open',openDetails[uid]);
      document.querySelectorAll(`[data-expand="${uid}"].expand-btn`).forEach(b=>{
        b.classList.toggle('open',openDetails[uid]);
        b.textContent=openDetails[uid]?'−':'+';
      });
    };
  });
  document.querySelectorAll('[data-dayopen]').forEach(el=>{
    el.onclick=()=>{
      const i=el.dataset.dayopen;
      openDetails['day'+i]=!openDetails['day'+i];
      const p=document.getElementById('dayb'+i);
      if(p) p.classList.toggle('open',openDetails['day'+i]);
    };
  });
  const rb=document.getElementById('resetBtn');
  if(rb) rb.onclick=()=>{
    if(confirm('Reset this week\'s checked exercises?')){
      data.checked={}; saveLocal(); schedulePush(); render(); toast('Week reset');
    }
  };
}

let tt;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(tt); tt=setTimeout(()=>el.classList.remove('show'),1600);
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadLocal();
weekRollover();
saveLocal();
pull().then(()=>render());
</script>
</body>
</html>
